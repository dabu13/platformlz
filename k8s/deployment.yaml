apiVersion: apps/v1
kind: Deployment
metadata:
  name: platformlz-demo
  labels:
    app: platformlz-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platformlz-demo
  template:
    metadata:
      labels:
        app: platformlz-demo
    spec:
      containers:
        - name: platformlz-demo
          image: "<ACR_LOGIN_SERVER>/platformlz-demo:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
