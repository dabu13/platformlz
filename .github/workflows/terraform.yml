name: 'Terraform Deploy to Azure'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write # Required for requesting the OIDC token
  contents: read  # Required for actions/checkout

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  scan:
    name: 'Checkov Security Scan'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Checkov Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: terraform
        soft_fail: true
        # This will not fail the job, allowing you to review results in the Actions tab.

  deploy:
    name: 'Deploy to Azure'
    runs-on: ubuntu-latest
    needs: scan
    # Only run the deploy job on the main branch pushes, not Pull Requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # This environment name creates the manual approval gate in GitHub
    environment:
      name: production
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      
    - name: Terraform Init
      run: terraform init -input=false

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve tfplan

    - name: Set Terraform outputs
      run: |
        echo "ACR_LOGIN_SERVER=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV
        echo "TF_RESOURCE_GROUP=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV
        echo "TF_CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
        echo "IMAGE_TAG=latest" >> $GITHUB_ENV

    - name: Login to ACR
      run: |
        ACR_NAME=$(echo "$ACR_LOGIN_SERVER" | cut -d'.' -f1)
        az acr login --name "$ACR_NAME"

    - name: Build and push Docker image
      run: |
        IMAGE="$ACR_LOGIN_SERVER/platformlz-demo:${{ env.IMAGE_TAG }}"
        docker build -t "$IMAGE" ./app
        docker push "$IMAGE"

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure AKS credentials
      run: |
        az aks get-credentials \
          --resource-group "$TF_RESOURCE_GROUP" \
          --name "$TF_CLUSTER_NAME" \
          --admin \
          --overwrite-existing

    - name: Deploy application to AKS
      run: |
        IMAGE="$ACR_LOGIN_SERVER/platformlz-demo:${IMAGE_TAG}"
        sed "s|<ACR_LOGIN_SERVER>|$ACR_LOGIN_SERVER|g" k8s/deployment.yaml > k8s/deployment.generated.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/deployment.generated.yaml
        kubectl set image deployment/platformlz-demo platformlz-demo="$IMAGE" --record
        kubectl rollout status deployment/platformlz-demo --timeout=120s
